# vhost nginx para co-locar la app en el EC2 existente (apps.getitchile.cl).
# Copiar a /etc/nginx/sites-available/fidelizacion y enlazar en sites-enabled.
# Ajusta el puerto interno (proxy_pass) al PORT del .env (ej. 3100).
#
# TLS: usa certbot  ->  sudo certbot --nginx -d fidelizacion.getitchile.cl
#       (o el origin cert de Cloudflare si el dominio está proxied por Cloudflare).

server {
    server_name fidelizacion.getitchile.cl;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # rate-limit por IP real
        proxy_set_header X-Forwarded-Proto $scheme;                     # cookie Secure detrás de TLS
        proxy_read_timeout 60s;
    }

    listen 80;
    # tras certbot, este bloque también escuchará en 443 con el certificado.
}
